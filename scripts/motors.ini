# NOSF Motor & Tuning Database
# This file stores physical motor constants and recommended baseline tuning.

# ─── MOTOR PHYSICAL SPECS ──────────────────────────────────────────────────
# Used for Phase 3 normalization (scaling SGT curves between different motors)

[fysetc-g36hsy4405-6d-1200]
resistance: 2.4
inductance: 0.0017
holding_torque: 0.11
max_current: 1.0
steps_per_revolution: 200

# ─── TUNING BASELINES ─────────────────────────────────────────────────────
# Recommended starting points for specific motor + driver combinations.
# These values are used by sg_tuner.py as the "center" of the sweep.

[tuning_baseline_fysetc_g36_erb20]
motor: fysetc-g36hsy4405-6d-1200
board: FYSETC ERB V2.0 (TMC2209)

# TMC Chopper Settings (Recommended for StallGuard stability)
driver_tbl: 2
driver_toff: 3
driver_hstrt: 5
driver_hend: 0

# StallGuard Baseline (at 400mA SG current)
# These provide the "starting point" for fine-tuning on a new machine.
sgt_nominal: 10
tcoolthrs: 0xFFFFF
sg_deriv_nominal: 15
max_reliable_speed: 3500
