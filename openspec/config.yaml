schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
context: |
  Project: NOSF standalone dual-lane MMU / RELOAD controller firmware for
    RP2040 on FYSETC ERB V2.0.
  Stack: C firmware built with Pico SDK/CMake/Ninja plus Python stdlib host
    tools under scripts/.
  Workflow: follow AGENTS.md and OpenSpec specs/changes/design notes; one
    milestone per commit; keep host-only analyzer/tuner phases separate from
    firmware changes; do not recreate repo-root TASK.md.
  Constraints: pure stdlib + pyserial for host tools; no local AI config in
    repo; firmware tunables live in config.ini and generated tune.h.

